<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onimaru Menu</title>
    <script>
        (function () {
            var path = location.pathname || "/";
            var base = path.substring(0, path.lastIndexOf("/") + 1);
            if (base && base !== "/") {
                var tag = document.createElement("base");
                tag.href = base;
                document.head.appendChild(tag);
            }
        })();
    </script>
    <link rel="stylesheet" href="shadow.css" />
</head>
<body>
    <div id="page-error">
        <div>
            <strong>Onimaru UI failed to load</strong><br /><br />
            Upload <code>index.html</code>, <code>shadow.css</code>, and <code>app.js</code> in the same folder.<br />
            Open DevTools (F12) → Network to see 404s.<br /><br />
            Browser test: add <code>?preview=1</code> to the URL.
        </div>
    </div>
    <div id="root">
        <div id="shadow-menu" class="shadow-menu">
            <div class="top-accent"></div>
            <div class="menu-body">
                <aside class="sidebar">
                    <h1 id="brand" class="brand">Onimaru</h1>
                    <nav id="sidebar-nav" class="sidebar-nav"></nav>
                </aside>
                <main id="content" class="content"></main>
            </div>
            <footer id="menu-footer" class="menu-footer">.gg/Onimaru</footer>
        </div>

        <div id="desc-toast" class="desc-toast"></div>

        <div id="input-wrapper" class="input-wrapper">
            <div id="input-title" class="input-header">Input</div>
            <div class="input-body"><span id="input-value"></span></div>
        </div>

        <div id="kbl-wrapper" class="kbl-wrapper">
            <div class="kbl-header"><span class="gear-icon">&#9881;</span> Keybinds</div>
            <div id="kbl-list" class="kbl-list"></div>
        </div>

        <div id="notifications" class="notifications"></div>
        <div id="fc-wrapper" class="fc-wrapper"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
